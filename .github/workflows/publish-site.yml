name: Publish Site

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/publish-site.yml"
  workflow_dispatch:

concurrency:
  group: publish-site-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Publish site
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: us-west1
          GCP_SERVICE: benson-website-v6
          GCP_SERVICE_ACCOUNT: 1048944000089-compute@developer.gserviceaccount.com
          API_BASE_URL: https://benson-api-v6-ecdo5oua2a-uw.a.run.app
          NEXT_PUBLIC_API_URL: https://benson-api-v6-ecdo5oua2a-uw.a.run.app
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-RLQ31P5HD0
          NEXT_PUBLIC_GSC_VERIFICATION: BZhBkLGmJPNnDGbiCFGp9Z-FnZTt5XhAuNPIKtdjv2o
          NEXT_PUBLIC_GTM_ID: GTM-TTZ2Z92K
        run: npm run publish:site
